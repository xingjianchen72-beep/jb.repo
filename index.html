<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Hello World</title>
    <style>
        /* 页面居中+超大字体样式 */
        * {
            margin: 0;
            padding: 0;
        }
        body {
            /* 让文字垂直水平居中 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }
        h1 {
            font-size: 120px; /* 超大字号 */
            font-family: Arial, sans-serif;
            color: #222;
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
</body>
</html>
